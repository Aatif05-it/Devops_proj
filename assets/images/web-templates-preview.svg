<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e5f0ff"/>
      <stop offset="1" stop-color="#c0d9ff"/>
    </linearGradient>
    <linearGradient id="cardCenter" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbe9e7"/>
      <stop offset="1" stop-color="#f5c6b8"/>
    </linearGradient>
    <linearGradient id="cardRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f7fa"/>
      <stop offset="1" stop-color="#a5def0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#111827" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="900" height="520" rx="32" fill="#f3f4f6"/>

  <!-- Left card -->
  <g transform="translate(170,110)" filter="url(#shadow)">
    <rect x="0" y="40" width="260" height="310" rx="10" fill="white"/>
    <rect x="0" y="12" width="260" height="32" rx="6" fill="#111827" opacity="0.92"/>
    <circle cx="22" cy="28" r="4" fill="#f87171"/>
    <circle cx="38" cy="28" r="4" fill="#facc15"/>
    <circle cx="54" cy="28" r="4" fill="#34d399"/>

    <rect x="0" y="40" width="260" height="160" fill="url(#cardLeft)"/>
    <rect x="18" y="216" width="140" height="10" rx="5" fill="#9ca3af"/>
    <rect x="18" y="236" width="90" height="10" rx="5" fill="#d1d5db"/>
    <rect x="18" y="260" width="200" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="18" y="278" width="180" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="18" y="296" width="120" height="8" rx="4" fill="#e5e7eb"/>
  </g>

  <!-- Center card (front) -->
  <g transform="translate(320,80)" filter="url(#shadow)">
    <rect x="0" y="40" width="260" height="320" rx="10" fill="white"/>
    <rect x="0" y="12" width="260" height="32" rx="6" fill="#111827" opacity="0.96"/>
    <circle cx="22" cy="28" r="4" fill="#f87171"/>
    <circle cx="38" cy="28" r="4" fill="#facc15"/>
    <circle cx="54" cy="28" r="4" fill="#34d399"/>

    <rect x="0" y="40" width="260" height="170" fill="url(#cardCenter)"/>

    <!-- image placeholder -->
    <rect x="75" y="70" width="110" height="110" rx="8" fill="#111827" opacity="0.75"/>
    <circle cx="130" cy="105" r="26" fill="#f3f4f6" opacity="0.94"/>
    <rect x="90" y="145" width="80" height="10" rx="5" fill="#22c55e"/>

    <!-- text lines -->
    <rect x="30" y="228" width="200" height="10" rx="5" fill="#9ca3af"/>
    <rect x="30" y="250" width="150" height="8" rx="4" fill="#d1d5db"/>
    <rect x="30" y="268" width="180" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="30" y="286" width="120" height="8" rx="4" fill="#e5e7eb"/>
  </g>

  <!-- Right card -->
  <g transform="translate(470,120)" filter="url(#shadow)">
    <rect x="0" y="40" width="260" height="300" rx="10" fill="white"/>
    <rect x="0" y="12" width="260" height="32" rx="6" fill="#111827" opacity="0.92"/>
    <circle cx="22" cy="28" r="4" fill="#f87171"/>
    <circle cx="38" cy="28" r="4" fill="#facc15"/>
    <circle cx="54" cy="28" r="4" fill="#34d399"/>

    <rect x="0" y="40" width="260" height="150" fill="url(#cardRight)"/>

    <!-- small tiles -->
    <rect x="26" y="70" width="60" height="60" rx="8" fill="#0ea5e9" opacity="0.9"/>
    <rect x="100" y="70" width="60" height="60" rx="8" fill="#f97316" opacity="0.9"/>
    <rect x="174" y="70" width="60" height="60" rx="8" fill="#22c55e" opacity="0.9"/>

    <rect x="24" y="218" width="180" height="10" rx="5" fill="#9ca3af"/>
    <rect x="24" y="240" width="140" height="8" rx="4" fill="#d1d5db"/>
    <rect x="24" y="258" width="170" height="8" rx="4" fill="#e5e7eb"/>
    <rect x="24" y="276" width="110" height="8" rx="4" fill="#e5e7eb"/>
  </g>
</svg>
