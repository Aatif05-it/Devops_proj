<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background area (page) -->
  <rect width="1200" height="360" rx="24" fill="#1F2430"/>

  <!-- Window frame -->
  <rect x="180" y="70" width="840" height="220" rx="8" fill="#F5F5F5"/>

  <!-- Top bar -->
  <rect x="180" y="70" width="840" height="32" rx="8" fill="#E5E7EB"/>
  <circle cx="198" cy="86" r="5" fill="#F97373"/>
  <circle cx="214" cy="86" r="5" fill="#FACC15"/>
  <circle cx="230" cy="86" r="5" fill="#4ADE80"/>
  <!-- fake url bar -->
  <rect x="260" y="78" width="340" height="16" rx="8" fill="#FFFFFF"/>

  <!-- Tabs -->
  <text x="220" y="118" fill="#111827" font-size="12" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    Frontend
  </text>
  <text x="290" y="118" fill="#6B7280" font-size="12" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    Backend
  </text>

  <!-- Toolbar icons -->
  <rect x="210" y="132" width="18" height="18" rx="3" fill="#F3F4F6"/>
  <rect x="236" y="132" width="18" height="18" rx="3" fill="#F3F4F6"/>
  <rect x="262" y="132" width="18" height="18" rx="3" fill="#F3F4F6"/>

  <!-- Run button -->
  <rect x="520" y="132" width="70" height="26" rx="6" fill="#10B981"/>
  <text x="542" y="149" fill="#FFFFFF" font-size="12" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    Run ▸
  </text>

  <!-- Left: code editor -->
  <rect x="190" y="160" width="420" height="120" fill="#1E293B"/>
  <!-- line numbers -->
  <text x="202" y="182" fill="#6B7280" font-size="11" font-family="Fira Code, Consolas, monospace">1</text>
  <text x="202" y="198" fill="#6B7280" font-size="11" font-family="Fira Code, Consolas, monospace">2</text>
  <text x="202" y="214" fill="#6B7280" font-size="11" font-family="Fira Code, Consolas, monospace">3</text>
  <text x="202" y="230" fill="#6B7280" font-size="11" font-family="Fira Code, Consolas, monospace">4</text>
  <text x="202" y="246" fill="#6B7280" font-size="11" font-family="Fira Code, Consolas, monospace">5</text>
  <text x="202" y="262" fill="#6B7280" font-size="11" font-family="Fira Code, Consolas, monospace">6</text>

  <!-- sample HTML code -->
  <text x="222" y="182" fill="#9CA3AF" font-size="11" font-family="Fira Code, Consolas, monospace">
    &lt;!DOCTYPE html&gt;
  </text>
  <text x="222" y="198" fill="#FBBF24" font-size="11" font-family="Fira Code, Consolas, monospace">
    &lt;html&gt;
  </text>
  <text x="238" y="214" fill="#FBBF24" font-size="11" font-family="Fira Code, Consolas, monospace">
    &lt;body&gt;
  </text>
  <text x="254" y="230" fill="#E5E7EB" font-size="11" font-family="Fira Code, Consolas, monospace">
    &lt;h1 style="color:red"&gt;Hello World!&lt;/h1&gt;
  </text>
  <text x="254" y="246" fill="#E5E7EB" font-size="11" font-family="Fira Code, Consolas, monospace">
    &lt;p&gt;This is a paragraph.&lt;/p&gt;
  </text>
  <text x="238" y="262" fill="#FBBF24" font-size="11" font-family="Fira Code, Consolas, monospace">
    &lt;/body&gt;
  </text>
  <text x="222" y="278" fill="#FBBF24" font-size="11" font-family="Fira Code, Consolas, monospace">
    &lt;/html&gt;
  </text>

  <!-- Right: result pane -->
  <rect x="620" y="160" width="390" height="120" fill="#FFFFFF"/>
  <rect x="620" y="160" width="390" height="30" fill="#EF4444"/>
  <text x="640" y="179" fill="#FFFFFF" font-size="16" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    Hello World!
  </text>
  <text x="640" y="210" fill="#111827" font-size="12" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    This is a paragraph.
  </text>

  <!-- Bottom buttons -->
  <rect x="360" y="300" width="190" height="30" rx="15" fill="#10B981"/>
  <text x="372" y="319" fill="#FFFFFF" font-size="11" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    Try Frontend Editor (HTML/CSS/JS)
  </text>

  <rect x="610" y="300" width="230" height="30" rx="15" fill="#FACC15"/>
  <text x="622" y="319" fill="#111827" font-size="11" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    Try Backend Editor (Python/PHP/Java/..)
  </text>
</svg>
