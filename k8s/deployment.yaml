apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydevschool-web
  labels:
    app: mydevschool-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mydevschool-web
  template:
    metadata:
      labels:
        app: mydevschool-web
    spec:
      containers:
        - name: web
          image: ghcr.io/aatif05-it/devops_proj:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
